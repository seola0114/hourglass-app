<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>모래시계</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; height: 100dvh;
            overflow: hidden; position: fixed; top: 0; left: 0;
            background:
                radial-gradient(ellipse at 15% 25%, rgba(255,200,255,0.35) 0%, transparent 28%),
                radial-gradient(ellipse at 85% 75%, rgba(200,255,240,0.28) 0%, transparent 30%),
                radial-gradient(circle at 70% 20%, rgba(255,230,180,0.22) 0%, transparent 22%),
                linear-gradient(180deg, #c5b0dc 0%, #d8b8dc 35%, #ebc4d4 65%, #f3d0d4 100%);
            touch-action: none; user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body::before {
            content: ''; position: fixed; inset: 0; pointer-events: none;
            background:
                linear-gradient(115deg, transparent 35%, rgba(255,180,220,0.18) 42%, rgba(180,220,255,0.18) 48%, rgba(200,255,200,0.15) 54%, transparent 62%),
                linear-gradient(60deg, transparent 30%, rgba(255,200,180,0.12) 38%, rgba(220,180,255,0.14) 45%, transparent 55%);
            mix-blend-mode: screen;
        }
        body::after {
            content: ''; position: fixed; inset: 0; pointer-events: none;
            background-image:
                radial-gradient(circle, rgba(255,255,255,0.9) 1px, transparent 2px),
                radial-gradient(circle, rgba(255,220,255,0.7) 1px, transparent 2px);
            background-size: 320px 320px, 220px 220px;
            background-position: 30px 60px, 180px 200px;
            opacity: 0.5;
        }
        canvas { display: block; position: fixed; top: 0; left: 0; touch-action: none; }
        #ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        #status {
            margin-top: 40px; color: rgba(120,90,140,0.55);
            font-size: 12px; font-weight: 600; letter-spacing: 2px;
            text-shadow: 0 1px 2px rgba(255,255,255,0.4);
        }
        #status.done { color: rgba(220,100,160,0.85); }
        #timer {
            margin-top: 8px; color: rgba(100,80,130,0.7);
            font-size: 24px; font-weight: 300;
            font-family: ui-monospace, 'SF Mono', monospace;
            min-height: 30px;
            text-shadow: 0 1px 2px rgba(255,255,255,0.4);
        }
        #hint {
            position: fixed; bottom: 32px; left: 0; width: 100%;
            text-align: center; color: rgba(120,90,140,0.4);
            font-size: 11px;
            text-shadow: 0 1px 2px rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
<div id="ui">
    <div id="status">대기 중</div>
    <div id="timer"></div>
    <div id="hint">화면을 탭하여 뒤집기</div>
</div>
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.164.1/build/three.module.js';

// ── Config ──
const HG_H = 4, MAX_R = 0.82, NECK_R = 0.12;
const CELL = 1, STEPS = 3, DURATION = 60, DONE_DELAY = 3000;
const SLIDE_MAX = 3; // 표면 모래가 한 step에 미끄러질 수 있는 최대 셀 수 → 안식각 ↓ (완만한 더미)
const SAND_HEX = [0xF0A8E8,0xE890DC,0xD478C8,0xC060B8,0xE898D8,0xF0B8E8,0xD888D0,0xB860B8];
const SAND_COL = SAND_HEX.map(h => new THREE.Color(h));
const P_SIZE = 0.0055;
const PARTICLES_PER_CELL = 10; // 셀당 입자 N개 → 미세한 가루처럼 연속적인 흐름

// ── State ──
let state = 'IDLE', W, H, dpr;
let gW = 65, gH = 130, cCol, cRow, maxHW, neckHW = 2;
let sand, clr, bnd, mv, colArr;
let t0 = 0, tDone = 0, fc = 0;
let totalSandCount = 0, neckFlowBudget = 0, neckFlowPerFrame = 0;
let prevFlip = false, hasOrient = false;
let flipAnim = -1, flipDur = 0.55;
let particlePos;

// ── UI refs ──
const statusEl = document.getElementById('status');
const timerEl = document.getElementById('timer');
const hintEl = document.getElementById('hint');

// ── Three.js Setup ──
W = window.visualViewport?.width || window.innerWidth;
H = window.visualViewport?.height || window.innerHeight;
dpr = Math.min(window.devicePixelRatio || 1, 2);

const scene = new THREE.Scene();
scene.background = null;

const camera = new THREE.PerspectiveCamera(24, W / H, 0.1, 100);
camera.position.set(0.15, 0.15, 13);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(W, H);
renderer.setPixelRatio(dpr);
renderer.setClearColor(0x000000, 0);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
document.body.appendChild(renderer.domElement);

// ── Lights ──
scene.add(new THREE.AmbientLight(0xf0e0f0, 1.2));
const dirLight = new THREE.DirectionalLight(0xfff0f8, 1.6);
dirLight.position.set(3, 4, 5);
scene.add(dirLight);
const rimLight = new THREE.DirectionalLight(0xa8c8f0, 0.9);
rimLight.position.set(-3, -1, -3);
scene.add(rimLight);
const warmLight = new THREE.PointLight(0xffb8d8, 0.6, 10);
warmLight.position.set(0, -1, 3);
scene.add(warmLight);
const topLight = new THREE.PointLight(0xc0d0ff, 0.5, 10);
topLight.position.set(0, 3, 2);
scene.add(topLight);

// ── Hourglass Group ──
const hgGroup = new THREE.Group();
scene.add(hgGroup);

// ── Profile (shared by glass mesh and sand simulation) ──
// d in [0, 1]: 0 = neck (center), 1 = top/bottom end
function bulgeRadius(d) {
    const keys = [
        [0.00, NECK_R],
        [0.04, NECK_R * 1.2],
        [0.12, NECK_R * 2.6],
        [0.30, MAX_R * 0.70],
        [0.55, MAX_R * 0.97],
        [0.75, MAX_R],
        [0.90, MAX_R * 0.86],
        [1.00, MAX_R * 0.42]
    ];
    for (let i = 0; i < keys.length - 1; i++) {
        if (d <= keys[i + 1][0]) {
            const t = (d - keys[i][0]) / (keys[i + 1][0] - keys[i][0]);
            const st = t * t * (3 - 2 * t);
            return keys[i][1] + (keys[i + 1][1] - keys[i][1]) * st;
        }
    }
    return keys[keys.length - 1][1];
}

function glassProfile() {
    const pts = [];
    for (let i = 0; i <= 140; i++) {
        const t = i / 140;
        const d = Math.abs(t - 0.5) * 2;
        const r = bulgeRadius(d);
        pts.push(new THREE.Vector2(r, (t - 0.5) * HG_H));
    }
    return pts;
}

// Glass body
const glassGeo = new THREE.LatheGeometry(glassProfile(), 64);
const glassMat = new THREE.MeshPhysicalMaterial({
    color: 0xffffff,
    transparent: true, opacity: 0.22,
    roughness: 0.0, metalness: 0.0,
    transmission: 0.92, thickness: 0.5,
    clearcoat: 1.0, clearcoatRoughness: 0.02,
    iridescence: 0.85, iridescenceIOR: 1.5,
    iridescenceThicknessRange: [200, 700],
    ior: 1.45, reflectivity: 0.7,
    side: THREE.DoubleSide, depthWrite: false
});
hgGroup.add(new THREE.Mesh(glassGeo, glassMat));

// Glass rim glow (soft pink-blue halo)
const rimMat = new THREE.MeshBasicMaterial({
    color: 0xffc8e0, transparent: true, opacity: 0.08,
    side: THREE.BackSide, blending: THREE.AdditiveBlending, depthWrite: false
});
const rimMesh = new THREE.Mesh(glassGeo.clone(), rimMat);
rimMesh.scale.multiplyScalar(1.02);
hgGroup.add(rimMesh);

// Glass specular highlight line
const highlightGeo = new THREE.LatheGeometry(
    glassProfile().map(p => new THREE.Vector2(p.x * 1.005, p.y)), 4, 0, 0.15
);
const highlightMat = new THREE.MeshBasicMaterial({
    color: 0xffffff, transparent: true, opacity: 0.18,
    side: THREE.DoubleSide, depthWrite: false
});
hgGroup.add(new THREE.Mesh(highlightGeo, highlightMat));

// Frame: rose-gold iridescent metal (caps, posts, beads, finial)
const frameMat = new THREE.MeshPhysicalMaterial({
    color: 0xeab8c4,
    metalness: 1.0, roughness: 0.18,
    clearcoat: 1.0, clearcoatRoughness: 0.08,
    iridescence: 0.7, iridescenceIOR: 1.4,
    iridescenceThicknessRange: [120, 520]
});
const FRAME_R = MAX_R + 0.18;
const CAP_THK = 0.16;

// Top & bottom plates
for (const ySign of [-1, 1]) {
    const y = ySign * (HG_H / 2 + CAP_THK / 2 + 0.02);
    const plate = new THREE.Mesh(
        new THREE.CylinderGeometry(FRAME_R, FRAME_R * 0.95, CAP_THK, 56),
        frameMat
    );
    plate.position.y = y;
    hgGroup.add(plate);
    // rounded outer rim
    const rim = new THREE.Mesh(
        new THREE.TorusGeometry(FRAME_R, 0.035, 14, 56),
        frameMat
    );
    rim.position.y = y + ySign * (CAP_THK / 2 - 0.01);
    rim.rotation.x = Math.PI / 2;
    hgGroup.add(rim);
}

// 4 vertical posts with mid-bead
const POST_R = 0.045;
const POST_RING_R = FRAME_R * 0.92;
const POST_LEN = HG_H + CAP_THK * 2 + 0.04;
for (let i = 0; i < 4; i++) {
    const a = (i / 4) * Math.PI * 2 + Math.PI / 4;
    const px = Math.cos(a) * POST_RING_R;
    const pz = Math.sin(a) * POST_RING_R;

    const post = new THREE.Mesh(
        new THREE.CylinderGeometry(POST_R, POST_R, POST_LEN, 20),
        frameMat
    );
    post.position.set(px, 0, pz);
    hgGroup.add(post);

    // Bead at vertical mid-point of each post
    const bead = new THREE.Mesh(
        new THREE.SphereGeometry(POST_R * 2.4, 24, 20),
        frameMat
    );
    bead.position.set(px, 0, pz);
    hgGroup.add(bead);

    // Small spherical foot below bottom plate
    const foot = new THREE.Mesh(
        new THREE.SphereGeometry(POST_R * 1.6, 20, 16),
        frameMat
    );
    foot.position.set(px, -(HG_H / 2 + CAP_THK + 0.05), pz);
    hgGroup.add(foot);
}

// Top finial: central small bead + 4 decorative curls
const finialY = HG_H / 2 + CAP_THK + 0.08;
const finial = new THREE.Mesh(
    new THREE.SphereGeometry(0.07, 24, 20),
    frameMat
);
finial.position.y = finialY + 0.08;
hgGroup.add(finial);

// Tiny stem for the finial
const stem = new THREE.Mesh(
    new THREE.CylinderGeometry(0.018, 0.018, 0.08, 12),
    frameMat
);
stem.position.y = finialY + 0.03;
hgGroup.add(stem);

// 4 curls (half-torus) radiating from the top plate
const curlGeo = new THREE.TorusGeometry(0.09, 0.018, 10, 24, Math.PI);
for (let i = 0; i < 4; i++) {
    const a = (i / 4) * Math.PI * 2 + Math.PI / 4;
    const curl = new THREE.Mesh(curlGeo, frameMat);
    const cx = Math.cos(a) * 0.16;
    const cz = Math.sin(a) * 0.16;
    curl.position.set(cx, finialY, cz);
    // orient curls so the open side faces inward & arcs upward
    curl.rotation.y = -a + Math.PI / 2;
    curl.rotation.x = Math.PI / 2;
    hgGroup.add(curl);
}

// ── Sand Grid Init ──
cCol = gW >> 1;
cRow = gH >> 1;
maxHW = cCol;
const n = gW * gH;
sand = new Uint8Array(n);
clr = new Uint8Array(n);
bnd = new Uint8Array(n);
mv = new Uint8Array(n);
colArr = Array.from({ length: gW }, (_, i) => i);

function hw2(row) {
    const d = Math.abs(row / (gH - 1) - 0.5) * 2;
    const r = bulgeRadius(d);
    const norm = (r - NECK_R) / (MAX_R - NECK_R);
    return Math.max(neckHW, Math.floor(neckHW + (maxHW - neckHW) * norm));
}
function radius3D(row) {
    const d = Math.abs(row / (gH - 1) - 0.5) * 2;
    return bulgeRadius(d);
}

for (let r = 0; r < gH; r++) {
    const w = hw2(r);
    const d = Math.abs(r / (gH - 1) - 0.5) * 2;
    const inBulb = d <= 0.82; // 어깨 외곽(좁아지는 rim) 제외 → 모래가 갇히는 자리 자체를 제거
    for (let c = 0; c < gW; c++)
        bnd[r * gW + c] = (inBulb && Math.abs(c - cCol) <= w) ? 1 : 0;
}

// Pre-compute 3D positions for each grid cell — PARTICLES_PER_CELL particles per cell with jitter
particlePos = new Float32Array(n * PARTICLES_PER_CELL * 3);
const yStep = HG_H / (gH - 1);
for (let r = 0; r < gH; r++) {
    const yCenter = (0.5 - r / (gH - 1)) * HG_H;
    const r3d = radius3D(r) * 0.82;
    const hw = hw2(r) || 1;
    const xStep = r3d / hw;
    for (let c = 0; c < gW; c++) {
        const offset = c - cCol;
        const xCenter = (offset / hw) * r3d;
        for (let p = 0; p < PARTICLES_PER_CELL; p++) {
            const idx = ((r * gW + c) * PARTICLES_PER_CELL + p) * 3;
            // 3 decorrelated hashes for x/y/z jitter
            const h1 = Math.sin(r * 127.1 + c * 311.7 + p * 71.3) * 43758.5453;
            const h2 = Math.sin(r * 71.3 + c * 113.5 + p * 217.7) * 43758.5453;
            const h3 = Math.sin(r * 213.9 + c * 79.1 + p * 309.5) * 43758.5453;
            const jx = ((h1 - Math.floor(h1)) - 0.5) * xStep * 0.9;
            const jy = ((h2 - Math.floor(h2)) - 0.5) * yStep * 0.9;
            const zN = (h3 - Math.floor(h3)) * 2 - 1;
            const xPos = xCenter + jx;
            const yPos = yCenter + jy;
            const zMax = Math.sqrt(Math.max(0, r3d * r3d - xPos * xPos));
            particlePos[idx] = xPos;
            particlePos[idx + 1] = yPos;
            particlePos[idx + 2] = zN * zMax;
        }
    }
}

function fillBottom() {
    sand.fill(0);
    // 1분 모래시계 분량 — 아래쪽 유리의 하단 절반만 채움
    const startRow = cRow + Math.floor((gH - cRow) * 0.45);
    for (let r = startRow; r < gH; r++) {
        for (let c = 0; c < gW; c++) {
            const i = r * gW + c;
            if (bnd[i]) { sand[i] = 1; clr[i] = (Math.random() * SAND_HEX.length) | 0; }
        }
    }
}
fillBottom();
totalSandCount = sand.reduce((a, b) => a + b, 0);
neckFlowPerFrame = totalSandCount / (DURATION * 60);

// ── Sand InstancedMesh ──
const sandGeo = new THREE.IcosahedronGeometry(P_SIZE, 0);
const sandMat = new THREE.MeshPhysicalMaterial({
    color: 0xffffff, roughness: 0.85, metalness: 0.0,
    sheen: 0.6, sheenColor: new THREE.Color(0xffd8ec),
    sheenRoughness: 0.7
});
const sandMesh = new THREE.InstancedMesh(sandGeo, sandMat, (totalSandCount + 500) * PARTICLES_PER_CELL);
sandMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
hgGroup.add(sandMesh);

const _mat4 = new THREE.Matrix4();
const _pos = new THREE.Vector3();
const _quat = new THREE.Quaternion();
const _scl = new THREE.Vector3(1, 1, 1);

function updateSandMesh() {
    let count = 0;
    for (let i = 0; i < n; i++) {
        if (!sand[i]) continue;
        const color = SAND_COL[clr[i]];
        const base = i * PARTICLES_PER_CELL * 3;
        for (let p = 0; p < PARTICLES_PER_CELL; p++) {
            const pi = base + p * 3;
            _pos.set(particlePos[pi], particlePos[pi + 1], particlePos[pi + 2]);
            _mat4.compose(_pos, _quat, _scl);
            sandMesh.setMatrixAt(count, _mat4);
            sandMesh.setColorAt(count, color);
            count++;
        }
    }
    sandMesh.count = count;
    sandMesh.instanceMatrix.needsUpdate = true;
    if (sandMesh.instanceColor) sandMesh.instanceColor.needsUpdate = true;
}
updateSandMesh();

// ── Sparkle Points ──
const SPARK_N = 30;
const sparkGeo2 = new THREE.BufferGeometry();
const sparkPos = new Float32Array(SPARK_N * 3);
const sparkSizes = new Float32Array(SPARK_N);
sparkGeo2.setAttribute('position', new THREE.BufferAttribute(sparkPos, 3));
sparkGeo2.setAttribute('size', new THREE.BufferAttribute(sparkSizes, 1));
const sparkMat2 = new THREE.PointsMaterial({
    color: 0xffc8e8, size: 0.09, transparent: true, opacity: 0,
    blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true
});
const sparkPoints = new THREE.Points(sparkGeo2, sparkMat2);
hgGroup.add(sparkPoints);

function initSparks() {
    for (let i = 0; i < SPARK_N; i++) {
        const r = cRow + 3 + Math.random() * (gH - cRow - 6);
        const hw = hw2(Math.round(r));
        const offset = (Math.random() - 0.5) * hw;
        const r3d = radius3D(Math.round(r)) * 0.7;
        const x = (offset / (hw || 1)) * r3d;
        const zMax = Math.sqrt(Math.max(0, r3d * r3d - x * x));
        sparkPos[i * 3] = x;
        sparkPos[i * 3 + 1] = (0.5 - r / (gH - 1)) * HG_H;
        sparkPos[i * 3 + 2] = (Math.random() * 2 - 1) * zMax;
        sparkSizes[i] = 0.04 + Math.random() * 0.08;
    }
    sparkGeo2.attributes.position.needsUpdate = true;
}

// ── Sand Physics ──
function shuffle(a) {
    for (let i = a.length - 1; i > 0; i--) {
        const j = (Math.random() * (i + 1)) | 0;
        const t = a[i]; a[i] = a[j]; a[j] = t;
    }
}
function simStep() {
    mv.fill(0);
    for (let r = gH - 2; r >= 0; r--) {
        shuffle(colArr);
        for (let ci = 0; ci < gW; ci++) {
            const c = colArr[ci];
            const i = r * gW + c;
            if (!sand[i] || mv[i]) continue;
            const isGate = (r === cRow);
            if (isGate && neckFlowBudget < 1) continue;
            const b = i + gW;
            // 1) 직하 (똑바로 아래로)
            if (bnd[b] && !sand[b]) {
                sand[b] = 1; clr[b] = clr[i]; sand[i] = 0; mv[b] = 1;
                if (isGate) neckFlowBudget -= 1;
                continue;
            }
            // 2) 사선 슬라이드 — 표면(위가 빈) 모래는 멀리까지 굴러 안식각을 낮춤.
            //    떨어지는 stream(위에 모래가 이어진 셀)은 1칸만 → 흐름이 퍼지지 않음
            const isPileTop = r === 0 || !sand[i - gW];
            const slideMax = isPileTop ? SLIDE_MAX : 1;
            const d1 = Math.random() < 0.5 ? 1 : -1;
            for (const dirSign of [d1, -d1]) {
                let bestDi = -1;
                for (let step = 1; step <= slideMax; step++) {
                    const nc = c + dirSign * step;
                    if (nc < 0 || nc >= gW) break;
                    // 같은 row의 경로 셀이 벽 밖이거나 막혀있으면 더 못 굴러감
                    if (!bnd[r * gW + nc]) break;
                    if (sand[r * gW + nc]) break;
                    const di = (r + 1) * gW + nc;
                    // 바로 아래가 벽이어도(어깨 안쪽 곡면) 더 안쪽으로 미끄러질 수 있도록 탐색을 계속
                    if (bnd[di] && !sand[di]) bestDi = di;
                }
                if (bestDi >= 0) {
                    sand[bestDi] = 1; clr[bestDi] = clr[i]; sand[i] = 0; mv[bestDi] = 1;
                    if (isGate) neckFlowBudget -= 1;
                    break;
                }
            }
        }
    }
}
function flipGrid() {
    const ts = new Uint8Array(n), tc = new Uint8Array(n);
    for (let r = 0; r < gH; r++) {
        const mr = gH - 1 - r;
        for (let c = 0; c < gW; c++) {
            const si = r * gW + c, di = mr * gW + c;
            if (sand[si] && bnd[di]) { ts[di] = 1; tc[di] = clr[si]; }
        }
    }
    sand.set(ts); clr.set(tc);
}
function isDone() {
    for (let r = 0; r <= cRow; r++)
        for (let c = 0; c < gW; c++)
            if (sand[r * gW + c]) return false;
    return true;
}

// ── State Machine ──
// 탭/뒤집기는 항상 grid를 뒤집고 RUNNING으로 (재)시작 → 어떤 자세에서든 모래가 흐름
function doFlip() {
    if (flipAnim >= 0) return;
    if (state === 'COMPLETED') {
        fillBottom();
        sparkMat2.opacity = 0;
        warmLight.intensity = 0.6;
    }
    flipAnim = 0;
    state = 'RUNNING';
    t0 = Date.now();
    neckFlowBudget = 0;
    updateUI();
}

function updateUI() {
    statusEl.textContent = state === 'IDLE' ? '대기 중' : state === 'RUNNING' ? '진행 중' : '완료';
    statusEl.className = state === 'COMPLETED' ? 'done' : '';
    hintEl.textContent = hasOrient ? '폰을 뒤집거나 화면을 탭하세요' : '화면을 탭하여 뒤집기';
}

// ── Events ──
renderer.domElement.addEventListener('pointerdown', (e) => { e.preventDefault(); doFlip(); });
renderer.domElement.addEventListener('touchstart', (e) => { e.preventDefault(); }, { passive: false });
document.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });

function onOri(e) {
    if (e.beta == null) return;
    hasOrient = true;
    const f = e.beta < -30;
    if (f !== prevFlip) {
        prevFlip = f;
        // 폰을 거꾸로 뒤집은 순간에만 flip 트리거 (원위치 복귀로는 멈추지 않음)
        if (f) doFlip();
    }
}
if (window.DeviceOrientationEvent) {
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        renderer.domElement.addEventListener('pointerdown', function rp() {
            DeviceOrientationEvent.requestPermission()
                .then(r => { if (r === 'granted') window.addEventListener('deviceorientation', onOri); })
                .catch(() => {});
            renderer.domElement.removeEventListener('pointerdown', rp);
        });
    } else {
        window.addEventListener('deviceorientation', onOri);
    }
}

function onResize() {
    W = window.visualViewport?.width || window.innerWidth;
    H = window.visualViewport?.height || window.innerHeight;
    camera.aspect = W / H;
    camera.updateProjectionMatrix();
    renderer.setSize(W, H);
}
window.addEventListener('resize', onResize);
window.visualViewport?.addEventListener('resize', onResize);
try { screen.orientation?.lock?.('portrait').catch(() => {}); } catch (e) {}

// ── Animation Loop ──
let prevTime = 0;
function animate(time) {
    const dt = Math.min((time - (prevTime || time)) / 1000, 0.1);
    prevTime = time;
    fc++;

    // Flip animation
    if (flipAnim >= 0) {
        flipAnim += dt / flipDur;
        if (flipAnim >= 1) {
            flipAnim = -1;
            flipGrid();
            hgGroup.rotation.x = 0;
        } else {
            const t = flipAnim;
            const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
            hgGroup.rotation.x = ease * Math.PI;
        }
    }

    // Sand simulation — 항상 돌림 (어떤 자세에서든 흐르도록).
    // 모래가 모두 바닥에 안착해 있으면 simStep은 아무것도 하지 않으므로 안전함.
    if (flipAnim < 0) {
        neckFlowBudget = Math.min(neckFlowBudget + neckFlowPerFrame, 3);
        for (let i = 0; i < STEPS; i++) simStep();
        if (state === 'RUNNING' && fc % 20 === 0 && isDone()) {
            state = 'COMPLETED'; tDone = Date.now();
            initSparks();
            sparkMat2.opacity = 0.9;
            try { navigator.vibrate?.(200); } catch (e) {}
            updateUI();
        }
    }

    // Completion → reset
    if (state === 'COMPLETED') {
        const elapsed = Date.now() - tDone;
        const pulse = Math.sin(elapsed * 0.006) * 0.4 + 0.5;
        sparkMat2.opacity = pulse;
        warmLight.intensity = 0.6 + pulse * 0.5;
        if (elapsed > DONE_DELAY) {
            state = 'IDLE'; fillBottom(); sparkMat2.opacity = 0;
            warmLight.intensity = 0.6;
            updateUI();
        }
    } else {
        sparkMat2.opacity = 0;
    }

    // Update sand mesh
    updateSandMesh();

    // Timer UI
    if (state === 'RUNNING' || state === 'COMPLETED') {
        const e = ((state === 'COMPLETED' ? tDone : Date.now()) - t0) / 1000;
        timerEl.textContent = `${(e / 60) | 0}:${String((e % 60) | 0).padStart(2, '0')}`;
    } else {
        timerEl.textContent = '';
    }

    // Subtle camera sway
    const st = time * 0.0002;
    camera.position.x = 0.15 + Math.sin(st) * 0.06;
    camera.position.y = 0.15 + Math.cos(st * 0.7) * 0.04;
    camera.lookAt(0, 0, 0);

    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}

updateUI();
requestAnimationFrame(animate);
</script>
